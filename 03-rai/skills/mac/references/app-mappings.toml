# Per-theme app mapping. What each app needs to be set to when this theme is active.
# Used by /mac-theme when generating theme.lua and by audit to check adapters.
# For apps the user hasn't installed yet, mark `manual = true` and note the source.
#
# Border = iconic, high-contrast palette pick per theme. Must be (a) in the
# theme's own palette (normal/bright/selection_bg) and (b) bright enough vs
# that theme's background to make the focused-window indicator obvious.
# Canonical `accent` values were too muted on cool-bg themes — pink/orange/
# cyan/purple variants from each palette make the focus cue actually pop.

[catppuccin]
vscode = "Catppuccin Mocha"
cursor = "Catppuccin Mocha"
border = "0xfff38ba8"

[gruvbox]
vscode = "Gruvbox Dark Medium"
cursor = "Gruvbox Dark Medium"
border = "0xffd65d0e"
vscode_extension = "jdinhlife.gruvbox"

[nord]
vscode = "Nord"
cursor = "Nord"
border = "0xff88c0d0"

[tokyo-night]
vscode = "Tokyo Night"
cursor = "Tokyo Night"
border = "0xffbb9af7"

[miasma]
vscode = "Miasma"
vscode_source = "https://raw.githubusercontent.com/OldJobobo/omarchy-miasma-theme/master/vscode.json"
cursor = "Miasma"
border = "0xffbb7744"
manual = true

[cobalt2]
vscode = "Cobalt2"
cursor = "Cobalt2"
border = "0xffffc600"

[gruvbox-light]
