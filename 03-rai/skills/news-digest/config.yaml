# news-digest config
# Edit identity, sources, caps, scoring weights, and context loads here.
# Skill workflow lives in SKILL.md. Observer JS in chrome_snippets/.

format_version: "v5.5"     # 2026-06-13: daily X-share target band x_share_target [0.40,0.55] — the body (Top Shelf+Feed) is rebalanced toward John's primary channel; removed the "Run notes" telemetry footer from the digest output. v5.4 2026-06-12: X target 2000→600 (one 2000-tweet scrape burned the account read budget 5/7 days); News Wire is now a GENERAL trend brief (X-majority, no identity scoring); persistent seen_ledger.jsonl replaces 3-day digest-parsing dedup; hook craft spec. v5.2 2026-06-06: scheduled-mode deadline contract (see SKILL.md "Scheduled Mode"). v5.1 2026-05-08: adaptive X For You burn-recovery ladder (W4-W6 with 45/90/180-min cooldowns); W1-yield-based burn detection short-circuits quick retries when session is pre-burned; state file persists between attempts so long cooldowns can be resumed.

# ---------------------------------------------------------------
# Scheduled mode (systemd runs) — deadline contract, SKILL.md §Scheduled Mode
# The runner's watchdog kills the session at run_budget_min. Collection must
# stop at run_budget_min - synthesis_reserve_min; no cooldown may cross that
# line. Keep run_budget_min in sync with the DEADLINE in run-news-ubuntu.sh.
# ---------------------------------------------------------------
scheduled_mode:
  run_budget_min: 120        # watchdog cap in run-news-ubuntu.sh (7200s)
  synthesis_reserve_min: 35  # reserved for synthesis + post-fill + grep checks

user:
  x_handle: "@johndoe"
  substack_handle: "@johndoe"
  medium_auth: "google_sso"

# ---------------------------------------------------------------
# Source collection targets + scroll tuning
# ---------------------------------------------------------------
sources:
  x_foryou:
    target: 2000                     # v5.6 2026-06-14: @johndoe is now X PREMIUM (read cap ~1k→~10k/day), so the floor is no longer the cap. Collection switched to the headless CDP collector `_collect_x_headless.py` (proven 2003 on 06-12; promoted from .runs). 2000 set by John 2026-06-14 = ~20% of the Premium 10k cap. HISTORY: on 06-12 the same ~2003 pull soft-flagged the 06-13/14 collapse — but that was 200% of the FREE 1k cap; at 20% of the Premium cap that overage is gone. CANARY: if the NEXT day's run throttles to a trickle, 2000 is too hot — dial back toward 1200. (Was 600 on free tier, which the per-account read cap defeated: ~189 collected.)
    scroll_delta: 800
    scroll_interval_ms: 700
    batch_size: 50
    plateau_tolerance_s: 120          # 2 min of zero growth before declaring plateau (was 60s); avoids bailing early on natural mid-scroll lulls
    success_threshold: 540            # 90% of target — declare success and stop ladder
    # ----------------------------------------------------------------
    # Adaptive burn-recovery ladder (v5.1 — 2026-05-08).
    # Standard 3-window/15-min ladder works for warm sessions. When the
    # @johndoe session is BURNED (heavy tweet pulls earlier in the
    # day on the same account), 15-min cooldowns are insufficient. The
    # extended ladder adds W4-W6 with progressively longer waits, plus
    # adaptive jump-to-long-wait when an early burn is detected.
    # User opt-in: time is acceptable; correctness > speed.
    # ----------------------------------------------------------------
    ladder:
      - { name: W1, cooldown_min: 0,   tab: fresh,           notes: "First attempt. Default tuning." }
      - { name: W2, cooldown_min: 15,  tab: fresh,           notes: "Standard cooldown." }
      - { name: W3, cooldown_min: 15,  tab: fresh,           notes: "Standard cooldown." }
      - { name: W4, cooldown_min: 45,  tab: fresh,           notes: "First long wait. Restores ~60% capacity for moderately-burned sessions." }
      - { name: W5, cooldown_min: 90,  tab: fresh,           notes: "Second long wait. Allows X per-account budget reset for heavier burn." }
      - { name: W6, cooldown_min: 180, tab: fresh-profile,   notes: "Final escape: 3-hour cool + fresh Chrome profile (re-login may be required). If this fails, account is severely throttled — abort and resume next day." }
    burn_detection:
      early_burn_yield: 150            # 25% of target — if W1 collects < 150, suspect pre-existing burn; skip W2/W3 quick retries
      confirmed_burn_yield: 60         # 10% of target — if any window yields < 60, burn is confirmed
      declining_yield_ratio: 0.5       # if W_n < 0.5 × W_{n-1}, declining → escalate cooldown
    on_early_burn:
      skip_to: W4                      # jump straight to first long wait (45 min)
    on_burn_confirmed:
      escalate_next_cooldown_to_min: 90  # bump next cooldown floor to 90 min
    max_total_wall_min: 180            # hard cap: 3 hours (was 6 at target 2000). A warm session hits 600 in one ~5-min window; 3h covers the full W1→W6 worst case at the new yields.
    state_file: ".runs/{date}/x_foryou_state.json"  # persists between attempts so a long wait can be resumed
  x_following:
    target: 500                       # 2026-06-14 (John): raised 180→500 on Premium. Following is ACTIVITY-BOUNDED (reverse-chron of accounts you follow) — it may plateau below 500 if your follows haven't posted that much in the window; the headless collector ships whatever it reaches via reload-recovery rather than spinning.
    scroll_delta: 800
    scroll_interval_ms: 700
    batch_size: 50
    entry_url: "https://x.com/home"
    requires_tab_click: "Following"
  substack:
    target: 200                       # revised 2026-05-06 from 500; reachable via /inbox + click-Load-more loop (~250 ceiling)
    scroll_delta: 1000
    scroll_interval_ms: 500
    batch_size: 20
    entry_url: "https://substack.com/inbox"
    pagination: click_load_more       # button text "Load more"; ~20 cards per click; stop at no_button or target
  medium:
    target: 30                        # revised 2026-05-06 from 50; /me/following-feed/all + selector fix yields 25, +5 from one More click
    scroll_delta: 1000
    scroll_interval_ms: 500
    batch_size: 5
    entry_url: "https://medium.com/me/following-feed/all"
    pagination: click_more_once       # button text "More"; one click adds ~5; button vanishes after
  hacker_news:
    target: 100
    fetch_comments_threshold: 100    # fetch top 2 comments when descendants >= this
  reddit:
    target_per_sub: 50
    fetch_comments_threshold: 50
  github_trending:
    target: 20
    readme_top_n: 10

# ---------------------------------------------------------------
# Reddit subreddit list (grouped for readability; order doesn't matter)
# ---------------------------------------------------------------
