# ---------------------------------------------------------------
# Weekly magazine (Bawaba Weekly) — SKILL.md § Weekly Magazine.
# The weekly is a MAGAZINE, not a recap: topical departments written as
# educational prose. weekly_mine.py buckets the week's raw dumps into
# department briefs; Claude picks subjects, enriches online, writes.
# ---------------------------------------------------------------
weekly:
  output_dir: "~/helm/08-bawaba/weekly/"
  archive_dir: "~/helm/13-archive/news/weekly/"
  read_target_min: 60                 # John's Saturday reading commitment
  word_target: [8000, 10000]
  departments:                        # order = magazine order; words are targets, not caps
    - { name: "Editor's Letter",  words: 300 }
    - { name: "Cover Story",      words: 1800, web_enrich: true }
    - { name: "Model State",      words: 1500, web_enrich: true }
    - { name: "The Lesson",       words: 2000, web_enrich: true }
    - { name: "The Workshop",     words: 1000, optional: true }   # cuttable on a thin week
    - { name: "Reading Shelf",    words: 800 }
    - { name: "Closing — Wisdom", words: 300 }
  web_enrichment:
    tools: [WebSearch, WebFetch]      # headless-safe; the weekly NEVER opens a browser
    max_fetches: 10
  mining:                             # weekly_mine.py knobs (defaults live in the script)
    brief_max_kb: 60
    lesson_min_days: 3                # concept must recur ≥3 days (auto-relaxed on thin weeks)...
    lesson_min_sources: 2             # ...across ≥2 sources
    cluster_min_items: 5
    model_min_items: 2
    shelf_min_body_chars: 3000
    shelf_top_n: 15
    cover_top_n: 5
    lesson_top_n: 10
    # model_entities / release_markers / interest_unigrams / evergreen_phrases:
    # curated lists default inside weekly_mine.py; override here only when tuning.

# ---------------------------------------------------------------
# /news chat canonical prompts (surfaced when user types /news chat)
# ---------------------------------------------------------------
chat_prompts:
  - "What should I pay most attention to and why?"
  - "What am I missing that I'd want to know?"
  - "Connect gem #N to my active projects."
  - "What would this look like in 6 months if the trend holds?"
