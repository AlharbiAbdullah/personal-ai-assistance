    - ExperiencedDevs

# ---------------------------------------------------------------
# Retry ladder (per source) — HARD RULE: 10 attempts. No skipping.
# Attempts 1-3 same Chrome tab; 4-6 fresh Chrome session; 7-10 Playwright.
# ---------------------------------------------------------------
retry:
  shortfall_threshold_pct: 10      # retry if collected < target * (1 - 0.10)
  max_attempts: 10                  # was 4; bumped per hard-rule "no AI-decided skip"
  no_skip: true                    # AI does NOT decide to skip a source. Only the user does.
  one_tab_per_source: true         # X For You, X Following, Substack, Medium each get a fresh dedicated tab
  wall_clock_ceilings_min:         # informational — retries run regardless
    x_total: 60                    # foryou + following combined (worst case across 10 attempts)
    substack: 35
    medium: 25
  x_strict: true                   # X is dealbreaker: abort entire run if For You OR Following fails after all 10 attempts
  x_abort_marker: "~/helm/08-bawaba/.news-failed-{date}.md"
  partial_dump_on_each_attempt: true  # save partial-attemptN.json so data is never lost between attempts

  # Strategies tried at each attempt (browser sources: x_foryou, x_following, substack, medium)
  strategies:
    attempt_1:
      tool: claude-in-chrome
      tab: fresh
      notes: primary strategy (current defaults). Dedicated tab.
    attempt_2:
      tool: claude-in-chrome
      tab: same-group-new-tab
      notes: close tab + open new tab in same group; slower scroll (interval × 2); scroll up-then-down to reset lazy-load
    attempt_3:
      tool: claude-in-chrome
      tab: same-group-new-tab
      notes: hard page refresh; alternate extractor selector set; media-blocking OFF
    attempt_4:
      tool: claude-in-chrome
      tab: fresh-group
      notes: recreate the tab group via tabs_create_mcp; treat as clean Chrome session
    attempt_5:
      tool: claude-in-chrome
      tab: fresh-group
      notes: fresh group + slow scroll + alternate selectors stacked
    attempt_6:
      tool: claude-in-chrome
      tab: fresh-group
      notes: fresh group + media-blocking off + observer rewritten against live DOM
    attempt_7:
      tool: playwright
      profile: ~/.cache/playwright-newsdigest/
      notes: Playwright with persistent profile (must have live logins); default tuning
    attempt_8:
      tool: playwright
      profile: ~/.cache/playwright-newsdigest/
      notes: Playwright slow scroll + alternate selectors
    attempt_9:
      tool: playwright
      profile: ~/.cache/playwright-newsdigest/
      notes: Playwright fresh context (new browser instance, same profile)
    attempt_10:
      tool: playwright
      profile: ~/.cache/playwright-newsdigest/
      notes: Playwright + observer rewritten against live DOM. Last attempt before abort.

# ---------------------------------------------------------------
# Per-source gem caps (applied post-scoring, pre-ordering)
# Only Hacker News and Medium have caps. All others uncapped within global 80-100.
# ---------------------------------------------------------------
caps:
  hacker_news: { daily: 10, weekly: 15 }
  medium:      { daily: 5,  weekly: 10 }

# ---------------------------------------------------------------
# Scoring rubric (see SKILL.md § Scoring Algorithm for full spec)
# ---------------------------------------------------------------
scoring:
  # Per-item 0-5 axes, weighted. Max gem_score = 57.5.
  weights:
    teaches: 3.0
    tool_discovery: 2.0
    artifact: 2.0
    discussion_quality: 1.5
    contrarian_evidence: 1.0
    postmortem: 2.0

  # Relevance multiplier by inferred topic cluster
  relevance:
    - mult: 1.0
      topics: [data_engineering, system_design, distributed_systems, product_shipping, startup_thinking]
    - mult: 0.9
      topics: [ai_research, agents, rag, benchmarks, local_news, energy, regional_tech]
    - mult: 0.7
      topics: [career, culture, interviews, claude_code, ai_tools]
    - mult: 0.3
      topics: [frontend, mobile, gaming, unrelated]

  # +20% boost if item connects to an active project
  project_bonus_multiplier: 1.2

active_projects:
  - Taskflow
  - Helios
  - OpenKit
  - Dataforge
  - Rai
  - GeoContext
  - Matchbox

# ---------------------------------------------------------------
# Output shaping
# ---------------------------------------------------------------
output:
  digest_dir: "~/helm/08-bawaba/daily/"
  dumps_dir: "~/helm/03-rai/skills/news-digest/.runs/"     # dumps per-day: .runs/YYYY-MM-DD/
  graduated_file: "~/helm/08-bawaba/_graduated.md"
  gems_total_target: [80, 100]              # min, max
  top_shelf_count: [20, 30]                 # min, max
  news_wire_count: [10, 15]                 # min, max
  feed_count: 60                            # main feed size

# ---------------------------------------------------------------
# Source affinity (multiplies into final score, then re-clamped to [0, 100]).
# Reflects John's actual reading habits — not collection volume,
# not platform popularity. Tune as reading patterns shift.
# ---------------------------------------------------------------
source_affinity:
  x_foryou: 1.4       # heavy daily reader
  x_following: 1.4
  hn: 1.1
  reddit: 0.9         # collected volume already large; modest deweight
  substack: 1.1       # boosting back to fair share after enrichment fix
  medium: 1.0
  github: 0.7         # quality-filtered already; shouldn't dominate

# Soft per-source cap as a fraction of any one section's size.
# Replaces the previous hard caps of 4/section (news_wire) and 8/section (top_shelf).
# 0.35 → news_wire ≤ 5/source, top_shelf ≤ 11/source, feed ≤ 21/source.
max_source_pct: 0.35

# Daily X-share target band [min, max]. X is John's primary collection channel and we want
# MORE of it, so the personalized body (Top Shelf + Feed) is rebalanced toward the UPPER end of
# this band — the Feed flexes (overriding the per-source soft cap for X) by swapping its weakest
# non-X items for the best unused ON-BEAT X (AI/DE/SysDesign/DevOps/projects; never regional/finance/
# viral junk). On throttled-X days it stops short of the band rather than padding with junk.
# News Wire is excluded (already X-majority by design); Top Shelf is untouched.
x_share_target: [0.40, 0.55]

# Hard cap on GitHub items across the entire digest.
# GitHub Trending is pre-filtered (~12 items/day); without a ceiling it overrepresents.
github_max: 4

deep_dive:
  candidates: 3                             # surface N, write 1 in full, list others as "also considered"

wisdom:
  max_items: 3
  min_items: 0                              # no filler on quiet days

# ---------------------------------------------------------------
# Cross-day dedup (Step 1.5) — v5.4: persistent seen-URL ledger.
# Every displayed item (News Wire + Top Shelf + Feed) is recorded forever in
# seen_ledger.jsonl; anything with a record from a PRIOR date is dropped from
# the pool. An old-but-unseen item passes once (labeled with its publish date
# when older than stale_label_days), then never again. Same-date entries never
# suppress a same-date re-run.
# ---------------------------------------------------------------
dedup:
  ledger_file: "seen_ledger.jsonl"          # skill-local, git-tracked, append-only, never pruned (~25 KB/day)
  stale_label_days: 3                       # publish date older than this → '· *published YYYY-MM-DD*' label, shown once
  # history_days: 3 — DEPRECATED v5.4: dedup no longer parses prior digests (that window broke when daily/ was archived mid-cycle)
  compare_sections: [gems, news_wire]       # sections whose displayed items get ledgered (wisdom skipped — quotes usually inside gems)
  strip_url_params:
    - utm_source
    - utm_medium
    - utm_campaign
    - utm_term
    - utm_content
    - utm_id
    - ref
    - ref_src
    - ref_url
    - s
    - t
    - si
    - fbclid
    - gclid
    - mc_cid
    - mc_eid
    - igshid
    - spm
    - trk
  # v5.4: ledger matching is exact on (normalized title + author) — O(1) against an ever-growing ledger.
  # URL match alone is sufficient; title match still requires the author on both sides.
  # title_levenshtein_max / title_substring_overlap_min — DEPRECATED v5.4 (fuzzy matching retired with digest parsing)
  author_match_required_for_title_fuzzy: true

# ---------------------------------------------------------------
# Cross-helm context (loaded at Step 0 for gem tagging + wisdom + deep dive grounding)
